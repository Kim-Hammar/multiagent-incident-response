[global]
   workgroup = INTERNAL
   server string = File & Backup Server
   security = user
   map to guest = Never
   log file = /var/log/samba/log.%m
   max log size = 1000

[shared]
   path = /srv/shared
   writable = yes
   browseable = yes
   valid users = backup
   create mask = 0644
   directory mask = 0755

[backups]
   path = /srv/backups
   read only = yes
   browseable = yes
   valid users = backup
