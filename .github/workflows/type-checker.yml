name: type-checker
run-name: ${{ github.actor }} type-checker
on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"
jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd ccs-response-planner-backend && pip install -e ".[test]"
      - name: Run mypy
        run: chmod +x type-checker.sh && ./type-checker.sh
